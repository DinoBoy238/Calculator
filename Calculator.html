<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Calculator</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="CalculatorCSS.css">
    </head>
    <body style="background-color: rgba(11,14,20,255)">
        <section class="Main">
            <Div class="RowOne">
                <button id="Clear" class="CalculatorButton">AC</button>
                <button id="Sign" class="CalculatorButton">+/-</button>
                <button id="Percent" class="CalculatorButton">X</button>
                <button id="Divison" class="CalculatorButton">&#xF7;</button>
            </Div>

            <div class="RowTwo">
                <button id="Seven" class="CalculatorButton">7</button>
                <button id="Eight" class="CalculatorButton">8</button>
                <button id="Nine" class="CalculatorButton">9</button>
                <button id="Multiplication" class="CalculatorButton">&times;</button>
            </div>
            <div class="RowThree">
                <button id="Four" class="CalculatorButton">4</button>
                <button id="Five" class="CalculatorButton">5</button>
                <button id="Six" class="CalculatorButton">6</button>
                <button id="Minus" class="CalculatorButton">-</button>
            </div>
            <div class="RowFour">
                <button id="One" class="CalculatorButton">1</button>
                <button id="Two" class="CalculatorButton">2</button>
                <button id="Three" class="CalculatorButton">3</button>
                <button id="Plus" class="CalculatorButton">+</button>
            </div>
            <div class="RowFive">
                <button id="Zero" class="CalculatorButton">0</button>
                <button id="Decimal" class="CalculatorButton">.</button>
                <button id="Equals" class="CalculatorButton">=</button>
            </div>
        </section>
    <script src="CalculatorJS.js"></script>
    </body>
</html>
