<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Calculator</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="CalculatorCSS.css">
    </head>
    <body style="background-color: rgba(11,14,20,255)">
        <section class="Main">
            <Div class="RowOne">
                <button class="Clear">AC</button>
                <button class="Sign">+/-</button>
                <button class="Percent">X</button>
                <button class="Divison">&#xF7;</button>
            </Div>

            <div class="RowTwo">
                <button class="Seven">7</button>
                <button class="Eight">8</button>
                <button class="Nine">9</button>
                <button class="Multiplication">	&times;</button>
            </div>
            <div class="RowThree">
                <button class="Four">4</button>
                <button class="Five">5</button>
                <button class="Six">6</button>
                <button class="Minus">-</button>
            </div>
            <div class="RowFour">
                <button class="One">1</button>
                <button class="Two">2</button>
                <button class="Three">3</button>
                <button class="Plus">+</button>
            </div>
            <div class="RowFive">
                <button class="Zero">0</button>
                <button class="Decimal">.</button>
                <button class="Equals">=</button>
            </div>
        </section>
    <script src="CalculatorJS.js"></script>
    </body>
</html>
