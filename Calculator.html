<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Calculator</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="CalculatorCSS.css">
    </head>
    <body style="background-color: rgba(11,14,20,255)">
        <section class="Main">
            <Div class="RowOne">
                <button id="Clear">AC</button>
                <button id="Sign">+/-</button>
                <button id="Percent">X</button>
                <button id="Divison">&#xF7;</button>
            </Div>

            <div class="RowTwo">
                <button id="Seven" onclick="setFirstNumber()">7</button>
                <button id="Eight">8</button>
                <button id="Nine">9</button>
                <button id="Multiplication">	&times;</button>
            </div>
            <div class="RowThree">
                <button id="Four">4</button>
                <button id="Five">5</button>
                <button id="Six">6</button>
                <button id="Minus">-</button>
            </div>
            <div class="RowFour">
                <button id="One">1</button>
                <button id="Two">2</button>
                <button id="Three">3</button>
                <button id="Plus">+</button>
            </div>
            <div class="RowFive">
                <button id="Zero">0</button>
                <button id="Decimal">.</button>
                <button id="Equals">=</button>
            </div>
        </section>
    <script src="CalculatorJS.js"></script>
    </body>
</html>
